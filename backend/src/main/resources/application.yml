server:
  port: 8080
spring:
  datasource:
    url: ${TMO_DB_URL}
    username: ${TMO_DB_USER}
    password: ${TMO_DB_PASSWORD}
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
  flyway:
    enabled: true
    locations: classpath:db/migration
management:
  endpoints:
    web:
      exposure:
        include: health,info
tmo:
  security:
    jwt-secret: ${TMO_JWT_SECRET}
    jwt-expiration-minutes: ${TMO_JWT_EXPIRATION_MINUTES:60}
    cors-origins: ${TMO_CORS_ORIGINS:http://localhost:5173}
  demo-data:
    enabled: ${TMO_DEMO_DATA_ENABLED:false}
    password: ${TMO_DEMO_PASSWORD:}
logging:
  level:
    root: INFO
    pe.edu.utp.tmo: INFO
    org.hibernate.SQL: WARN
